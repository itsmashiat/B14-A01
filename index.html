<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DEVCONF 2026</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Arimo:ital,wght@0,400..700;1,400..700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">

<body>
    <!-- Navbar Section -->
    <nav>
        <div class="navContainer">
            <img src="./assets/logo.png" alt="DevConf 2026 Logo">
            <ul class="navMenu">
                <li>Speakers</li>
                <li>Schedule</li>
                <li>Tracks</li>
                <li>Venue</li>
                <li>Blog</li>
            </ul>

    <header class="hero">
        <div class="heroContent">
            <h1 class="heroTitle">Code. <em>Connect</em>. Create</h1>

            </p>
            <button class="btn" id="hero-register-btn">Register Now</button>
